/api/applications:
  get:
    tags:
      - Applications
    summary: Get all applications
    description: Retrieve a list of applications with optional filters
    operationId: getApplications
    parameters:
      - name: decided
        in: query
        description: Filter by decided status
        schema:
          type: string
      - name: closed
        in: query
        description: Filter by closed status
        schema:
          type: string
      - name: admission
        in: query
        description: Filter by admission status
        schema:
          type: string
      - name: finalEnrolment
        in: query
        description: Filter by final enrollment status
        schema:
          type: string
      - name: year
        in: query
        description: Filter by application year
        schema:
          type: string
      - name: populate
        in: query
        description: Whether to populate related fields
        schema:
          type: boolean
    responses:
      '200':
        description: Applications retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/applications.yaml#/ApplicationListResponse'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'

/api/applications/application/{application_id}:
  delete:
    tags:
      - Applications
    summary: Delete application
    description: Delete a specific application
    operationId: deleteApplication
    parameters:
      - $ref: '../components/parameters/common.yaml#/application_id'
    responses:
      '200':
        description: Application deleted successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/applications.yaml#/SuccessWithMessage'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'
      '409':
        $ref: '../components/responses/common.yaml#/Error'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

/api/applications/{applicationId}/refresh:
  post:
    tags:
      - Applications
    summary: Refresh application
    description: Refresh application data from external sources
    operationId: refreshApplication
    parameters:
      - $ref: '../components/parameters/common.yaml#/applicationId'
    responses:
      '200':
        description: Application refreshed successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/applications.yaml#/ApplicationDetailResponse'
      '400':
        $ref: '../components/responses/common.yaml#/Error'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

/api/applications/all/active/applications/paginated:
  get:
    tags:
      - Applications
    summary: Get active applications (paginated)
    description: >
      Server-side paginated, sorted and searchable list of active (non-archived)
      students' applications. Without `userId` it covers all active students;
      with `userId` it scopes to the students that TaiGer user supervises (as
      agent or editor). The application deadline (`deadlineDate`) is derived from
      the student's application_year and the program's
      application_deadline/semester and can be sorted on.
    operationId: getActiveStudentsApplicationsPaginated
    parameters:
      - in: query
        name: userId
        schema:
          type: string
        description: Scope to this TaiGer user's supervised students
      - in: query
        name: page
        schema:
          type: integer
          default: 1
        description: 1-based page number
      - in: query
        name: limit
        schema:
          type: integer
          default: 20
          maximum: 100
        description: Page size (capped at 100)
      - in: query
        name: sortBy
        schema:
          type: string
          enum:
            - program_name
            - school
            - semester
            - degree
            - country
            - application_year
            - target_year
            - deadline
            - firstname_lastname
            - decided
            - closed
            - admission
        description: Field to sort by (defaults to deadline)
      - in: query
        name: sortOrder
        schema:
          type: string
          enum: [asc, desc]
          default: asc
      - in: query
        name: search
        schema:
          type: string
        description: Free-text search across program name, school, country, degree, semester, student name and application year
      - in: query
        name: decided
        schema:
          type: string
      - in: query
        name: closed
        schema:
          type: string
      - in: query
        name: admission
        schema:
          type: string
      - in: query
        name: application_year
        schema:
          type: string
      - in: query
        name: semester
        description: Exact program semester (e.g. WS, SS)
        schema:
          type: string
      - in: query
        name: country
        description: Comma-separated country codes (matched with $in)
        schema:
          type: string
      - in: query
        name: studentName
        description: Matches the student's first or last name (contains, case-insensitive)
        schema:
          type: string
      - in: query
        name: program
        description: Matches the program's school or program name (contains, case-insensitive)
        schema:
          type: string
      - in: query
        name: agentName
        description: Matches any supervising agent's first or last name (contains, case-insensitive)
        schema:
          type: string
      - in: query
        name: editorName
        description: Matches any supervising editor's first or last name (contains, case-insensitive)
        schema:
          type: string
    responses:
      '200':
        description: Paginated active applications retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    applications:
                      type: array
                      items:
                        $ref: '../components/schemas/applications.yaml#/ApplicationListItem'
                    total:
                      type: integer
                    page:
                      type: integer
                    limit:
                      type: integer
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'

/api/applications/distribution:
  get:
    tags:
      - Applications
    summary: Open applications deadline distribution
    description: >
      Deadline distribution for the chart, computed in the DB. Returns only the
      buckets ({name, active, potentials}) — name is the derived deadline label
      ("YYYY/MM/DD" or "{year}-Rolling"), active = decided, potentials = undecided.
      Without `userId` it covers all active students; with `userId` it scopes to
      the students that TaiGer user supervises (agent or editor).
    operationId: getApplicationsDeadlineDistribution
    parameters:
      - in: query
        name: userId
        required: false
        schema:
          type: string
        description: Optional agent/editor id to scope the distribution to.
    responses:
      '200':
        description: Distribution retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        example: '2025/01/15'
                      active:
                        type: integer
                      potentials:
                        type: integer
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'

/api/applications/program-update-status:
  get:
    tags:
      - Applications
    summary: Programs update status (distinct programs)
    description: >
      Distinct programs referenced by active students' applications, with update
      metadata, computed in the DB (only the small program list is returned).
      Without `userId` it covers all active students; with `userId` it scopes to
      that user's supervised students. `decided=O` returns only programs with a
      decided application.
    operationId: getApplicationProgramsUpdateStatus
    parameters:
      - in: query
        name: userId
        required: false
        schema:
          type: string
        description: Optional agent/editor id to scope to.
      - in: query
        name: decided
        required: false
        schema:
          type: string
        description: When 'O', only programs with a decided application are returned.
    responses:
      '200':
        description: Programs update status retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      program_id:
                        type: string
                      school:
                        type: string
                      program_name:
                        type: string
                      degree:
                        type: string
                      semester:
                        type: string
                      whoupdated:
                        type: string
                      updatedAt:
                        type: string
                        format: date-time
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'

/api/applications/student/{studentId}/{application_id}:
  put:
    tags:
      - Applications
    summary: Update application
    description: Update a specific application for a student
    operationId: updateApplication
    parameters:
      - $ref: '../components/parameters/common.yaml#/studentId'
      - $ref: '../components/parameters/common.yaml#/application_id'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/applications.yaml#/ApplicationBase'
    responses:
      '200':
        description: Application updated successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/applications.yaml#/SuccessMessageResponse'
      '400':
        $ref: '../components/responses/common.yaml#/Error'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

/api/applications/taiger-user/{userId}/stats:
  get:
    tags:
      - Applications
    summary: Application status stats for a TaiGer user's students
    description: >
      Aggregated application status counts (computed in the DB) plus the TaiGer
      user record, for the AgentPage stat cards. Scoped to the students this
      user supervises (agent or editor).
    operationId: getMyStudentsApplicationsStats
    parameters:
      - in: path
        name: userId
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Stats retrieved successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    user:
                      type: object
                    stats:
                      type: object
                      properties:
                        totalStudents:
                          type: integer
                        totalApplications:
                          type: integer
                        decidedYesApplications:
                          type: integer
                        decidedNoApplications:
                          type: integer
                        undecidedApplications:
                          type: integer
                        submittedApplications:
                          type: integer
                        pendingApplications:
                          type: integer
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'

