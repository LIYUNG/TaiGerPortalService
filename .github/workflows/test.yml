name: Tests

# Runs the Jest suite and static checks (type-check + lint) on every pull request.
on:
  pull_request:

# Cancel an in-progress run for a PR when new commits are pushed to it.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Jest (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    env:
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run test` is intentionally NOT used here: it runs jest with
      # --watchAll, which never exits in CI. The suite is fully mocked (no
      # database), so `test:ci` runs it once in parallel and deterministically.
      - name: Run tests
        run: npm run test:ci -- --forceExit

  quality:
    name: Type-check & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
