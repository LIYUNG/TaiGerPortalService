/api/crm/leads:
  get:
    tags:
      - CRM
    summary: Get leads
    description: Get all CRM leads
    operationId: getLeads
    responses:
      '200':
        description: Leads retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/crm.yaml#/CRMLeadListResponse'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'

/api/crm/leads/{leadId}:
  get:
    tags:
      - CRM
    summary: Get lead
    description: Get lead details
    operationId: getLead
    parameters:
      - $ref: '../components/parameters/common.yaml#/leadId'
    responses:
      '200':
        description: Lead retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/crm.yaml#/CRMLeadResponse'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

/api/crm/leads/{leadId}/tags:
  get:
    tags:
      - CRM
    summary: Get lead tags
    description: Get tags for a lead
    operationId: getLeadTags
    parameters:
      - $ref: '../components/parameters/common.yaml#/leadId'
    responses:
      '200':
        description: Tags retrieved successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/crm.yaml#/CRMLeadTagsResponse'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'
  post:
    tags:
      - CRM
    summary: Append lead tags
    description: Add tags to a lead (does not remove existing tags)
    operationId: appendLeadTags
    parameters:
      - $ref: '../components/parameters/common.yaml#/leadId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/crm.yaml#/CRMLeadTagsUpdate'
    responses:
      '200':
        description: Tags appended successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/crm.yaml#/CRMLeadTagsResponse'
      '400':
        $ref: '../components/responses/common.yaml#/Error'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'
  put:
    tags:
      - CRM
    summary: Replace lead tags
    description: Replace tags for a lead (removes all existing tags and sets new ones)
    operationId: updateLeadTags
    parameters:
      - $ref: '../components/parameters/common.yaml#/leadId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/crm.yaml#/CRMLeadTagsUpdate'
    responses:
      '200':
        description: Tags updated successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/crm.yaml#/CRMLeadTagsResponse'
      '400':
        $ref: '../components/responses/common.yaml#/Error'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'
  delete:
    tags:
      - CRM
    summary: Delete lead tags
    description: Delete specific tags from a lead by tag names or IDs
    operationId: deleteLeadTags
    parameters:
      - $ref: '../components/parameters/common.yaml#/leadId'
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              tags:
                type: array
                items:
                  type: string
                description: Tag names to delete
              tag:
                type: string
                description: Single tag name to delete
              tagIds:
                type: array
                items:
                  type: string
                description: Tag IDs to delete
              tagId:
                type: string
                description: Single tag ID to delete
    responses:
      '200':
        description: Tags deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: array
                  items:
                    type: string
      '400':
        $ref: '../components/responses/common.yaml#/Error'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

