/api/crm/leads/{leadId}/notes/{noteId}:
  patch:
    tags:
      - CRM
    summary: Update lead note
    description: Update a specific note for a lead
    operationId: updateLeadNote
    parameters:
      - $ref: '../components/parameters/common.yaml#/leadId'
      - name: noteId
        in: path
        required: true
        schema:
          type: string
        description: Note ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              note:
                type: string
                description: Updated note content
            required:
              - note
    responses:
      '200':
        description: Note updated successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/crm.yaml#/CRMLeadNoteResponse'
      '400':
        $ref: '../components/responses/common.yaml#/Error'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'
  delete:
    tags:
      - CRM
    summary: Delete lead note
    description: Delete a specific note from a lead
    operationId: deleteLeadNote
    parameters:
      - $ref: '../components/parameters/common.yaml#/leadId'
      - name: noteId
        in: path
        required: true
        schema:
          type: string
        description: Note ID
    responses:
      '200':
        description: Note deleted successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                data:
                  type: object
                  properties:
                    id:
                      type: string
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

